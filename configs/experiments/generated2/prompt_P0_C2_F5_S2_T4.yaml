00_metadata:
  experiment_id: "prompt_P0_C2_F5_S2_T4"
  name: "prompt_P0_C2_F5_S2_T4"
  description: "P0 + C2 + F5 + S2 + T4 조합"
  is_english_cot: true
  char_count: 394
  control_score: 16

persona: ""

constraints:
  - |
    - 근거: 문서 내 정보로 국한 (외부지식 금지) / - 출처: 수치 옆 페이지 번호 필수
output_format:
  - |
    [Bilingual_Format]
    <thought_en>: Step-by-step reasoning and fact listing in English.
    <answer_ko>: 한국어 최종 답변 및 근거 페이지 표기.
few_shot_examples:
  - |
    [예시 1] - Q: 예산은? / - A: 제안요청서(5p) 근거, 50억 원입니다.
    [예시 2] - Q: 제출처는? / - A: 공고문(2p) 근거, e-발주 시스템입니다.
thought_trigger:
  - |
    [무결성 가이드]
    리스팅: 질문 관련 본문 내 예산, 날짜, 수치 항목을 누락 없이 나열.
    필터링: 질문의 제한 조건과 나열된 데이터 간의 모순점(VAT, 마감일 등) 상세 대조.
    확정: 검증 통과한 수치만을 최종 답변에 반영.
