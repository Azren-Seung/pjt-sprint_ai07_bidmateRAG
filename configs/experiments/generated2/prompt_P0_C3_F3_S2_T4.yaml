00_metadata:
  experiment_id: "prompt_P0_C3_F3_S2_T4"
  name: "prompt_P0_C3_F3_S2_T4"
  description: "P0 + C3 + F3 + S2 + T4 조합"
  is_english_cot: false
  char_count: 343
  control_score: 18

persona: ""

constraints:
  - |
    [철칙] 외부지식 배제 / [필수] 답변 전 관련 수치/조건 전수 추출 서술 / [제약] 추출 목록 내 정보만 답변 채택
output_format:
  - |
    [섹션1_분석] 본문 내 수치·조건 전수 나열 -> [섹션2_최종] 나열 정보 기반 정답 산출
few_shot_examples:
  - |
    [예시 1] - Q: 예산은? / - A: 제안요청서(5p) 근거, 50억 원입니다.
    [예시 2] - Q: 제출처는? / - A: 공고문(2p) 근거, e-발주 시스템입니다.
thought_trigger:
  - |
    [무결성 가이드]
    리스팅: 질문 관련 본문 내 예산, 날짜, 수치 항목을 누락 없이 나열.
    필터링: 질문의 제한 조건과 나열된 데이터 간의 모순점(VAT, 마감일 등) 상세 대조.
    확정: 검증 통과한 수치만을 최종 답변에 반영.
