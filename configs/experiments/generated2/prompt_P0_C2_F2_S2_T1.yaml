  name: "prompt_P0_C2_F2_S2_T1"
  description: "P0 + C2 + F2 + S2 + T1 조합"
  is_english_cot: false
  char_count: 214
  control_score: 10

persona: ""

constraints:
  - |
    - 근거: 문서 내 정보로 국한 (외부지식 금지) / - 출처: 수치 옆 페이지 번호 필수 / [언어] 최종 답변은 무조건 한국어로만 작성(영어 답변 절대 금지)
output_format:
  - |
    [구성] 결론 중심 단답 / [근거] 관련 수치 + 페이지 번호 명시
few_shot_examples:
  - |
    [예시 1] - Q: 예산은? / - A: 제안요청서(5p) 근거, 50억 원입니다.
    [예시 2] - Q: 제출처는? / - A: 공고문(2p) 근거, e-발주 시스템입니다.
thought_trigger:
  - |
    [사고 지침] 단계별로 사고하여 근거를 도출하되, 모든 추론 과정과 최종 답변은 반드시 한국어로만 서술하라.
