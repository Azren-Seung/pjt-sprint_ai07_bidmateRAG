00_metadata:
  experiment_id: "prompt_P0_C0_F0_S4_T3"
  name: "prompt_P0_C0_F0_S4_T3"
  description: "P0 + C0 + F0 + S4 + T3 조합"
  is_english_cot: false
  char_count: 245
  control_score: 10

persona: ""

constraints:
  - |
    [언어] 최종 답변은 무조건 한국어로만 작성(영어 답변 절대 금지)
output_format:
few_shot_examples:
  - |
    [성공 예시]
    Q. 제출 기한?
    [색인] 1p: 시작 11/1, 3p: 마감 11/10 확인.
    [비교] 질문의 '전체 기간' 조건과 대조 완료.
    [정답] 11/1 ~ 11/10.

    [거절 예시]
    Q. 담당자 연락처?
    [색인] 본문 전수 조사 결과 연락처 항목 누락.
    [비교] 질문의 요구 정보가 문서 내에 존재하지 않음.
    [정답] 정보 없음.
thought_trigger:
  - |
    1. 전수조사: 질문 연관 수치·조건 리스팅 / 2. 검증: 항목별 일치 여부 대조 / 3. 답변
