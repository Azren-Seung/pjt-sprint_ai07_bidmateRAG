00_metadata:
  experiment_id: "prompt_P0_C4_F4_S4_T5"
  name: "prompt_P0_C4_F4_S4_T5"
  description: "P0 + C4 + F4 + S4 + T5 조합"
  is_english_cot: true
  char_count: 733
  control_score: 20

persona: ""

constraints:
  - |
    [절대 원칙] <context> 수치 데이터 외 판단 근거 채택 불가.
    [데이터 무결성 가이드]
    사실 고립: 질문 연관 데이터(금액, 날짜, 자격)를 문서에서 추출하여 목록화할 것.
    논리 검증: 추출된 목록과 질문 요구사항의 상충 여부를 단계별로 명시할 것.
    최종 선별: 검증 과정에서 모순이 발견되지 않은 정보만 엄선하여 최종 응답에 반영할 것.
    *위 지침 미준수 시 해당 답변은 무효 처리함. / [언어] 최종 답변은 무조건 한국어로만 작성(영어 답변 절대 금지)
output_format:
  - |
    [필수_3단_양식]
    [근거_색인]: 질문 관련 수치(금액/날짜) 및 조항 원문 복사 리스트.
    [비교_논증]: 추출 사실 vs 질문 요구사항 간 일대일 부합 여부 서술.
    [최종_제시]: 검증 완료된 팩트 중심의 압축 결론.
    *누락 섹션 존재 시 오답 처리.
few_shot_examples:
  - |
    [성공 예시]
    Q. 제출 기한?
    [색인] 1p: 시작 11/1, 3p: 마감 11/10 확인.
    [비교] 질문의 '전체 기간' 조건과 대조 완료.
    [정답] 11/1 ~ 11/10.

    [거절 예시]
    Q. 담당자 연락처?
    [색인] 본문 전수 조사 결과 연락처 항목 누락.
    [비교] 질문의 요구 정보가 문서 내에 존재하지 않음.
    [정답] 정보 없음.
thought_trigger:
  - |
    [English_Logic_Engine]
    Analysis: Extract and list all relevant data in English.
    Verification: Cross-check conditions and values in English.
    Output: Provide final answer in Korean.
