00_metadata:
  experiment_id: "prompt_P0_C1_F5_S1_T4"
  name: "prompt_P0_C1_F5_S1_T4"
  description: "P0 + C1 + F5 + S1 + T4 조합"
  is_english_cot: true
  char_count: 307
  control_score: 12

persona: ""

constraints:
  - |
    참조: 제공된 문서 한정 / [언어] 최종 답변은 무조건 한국어로만 작성(영어 답변 절대 금지)
output_format:
  - |
    [Bilingual_Format]
    <thought_en>: Step-by-step reasoning and fact listing in English.
    <answer_ko>: 한국어 최종 답변 및 근거 페이지 표기.
few_shot_examples:
  - |
    [예시 1] Q. 사업목적? A. 시스템 구축
    [예시 2] Q. 총예산? A. 50억
thought_trigger:
  - |
    [무결성 가이드]
    리스팅: 질문 관련 본문 내 예산, 날짜, 수치 항목을 누락 없이 나열.
    필터링: 질문의 제한 조건과 나열된 데이터 간의 모순점(VAT, 마감일 등) 상세 대조.
    확정: 검증 통과한 수치만을 최종 답변에 반영.
