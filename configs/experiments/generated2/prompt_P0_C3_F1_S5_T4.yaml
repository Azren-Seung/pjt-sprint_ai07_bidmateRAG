00_metadata:
  experiment_id: "prompt_P0_C3_F1_S5_T4"
  name: "prompt_P0_C3_F1_S5_T4"
  description: "P0 + C3 + F1 + S5 + T4 조합"
  is_english_cot: true
  char_count: 605
  control_score: 16

persona: ""

constraints:
  - |
    [철칙] 외부지식 배제 / [필수] 답변 전 관련 수치/조건 전수 추출 서술 / [제약] 추출 목록 내 정보만 답변 채택 / [언어] 최종 답변은 무조건 한국어로만 작성(영어 답변 절대 금지)
output_format:
  - |
    [양식] 간결한 서술형 요약
few_shot_examples:
  - |
    [성공 예시]
    Q. 예산 규모 및 VAT 포함 여부?
    1. [Logic_EN] Context p.5: "Total 5B KRW". p.12: "VAT excluded".
    2. [Logic_EN] Compare with query: Amount matches, VAT status identified.
    3. [Answer_KO] 총액 50억 원 (VAT 별도).

    [거절 예시]
    Q. 사업 담당자 연락처?
    1. [Logic_EN] Search all context fields for "contact", "phone", "manager".
    2. [Logic_EN] Result: No relevant information found in the provided text.
    3. [Answer_KO] 정보 없음.
thought_trigger:
  - |
    [무결성 가이드]
    리스팅: 질문 관련 본문 내 예산, 날짜, 수치 항목을 누락 없이 나열.
    필터링: 질문의 제한 조건과 나열된 데이터 간의 모순점(VAT, 마감일 등) 상세 대조.
    확정: 검증 통과한 수치만을 최종 답변에 반영.
