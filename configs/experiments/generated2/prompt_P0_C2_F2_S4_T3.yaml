00_metadata:
  experiment_id: "prompt_P0_C2_F2_S4_T3"
  name: "prompt_P0_C2_F2_S4_T3"
  description: "P0 + C2 + F2 + S4 + T3 조합"
  is_english_cot: false
  char_count: 333
  control_score: 16

persona: ""

constraints:
  - |
    - 근거: 문서 내 정보로 국한 (외부지식 금지) / - 출처: 수치 옆 페이지 번호 필수
output_format:
  - |
    [구성] 결론 중심 단답 / [근거] 관련 수치 + 페이지 번호 명시
few_shot_examples:
  - |
    [성공 예시]
    Q. 제출 기한?
    [색인] 1p: 시작 11/1, 3p: 마감 11/10 확인.
    [비교] 질문의 '전체 기간' 조건과 대조 완료.
    [정답] 11/1 ~ 11/10.

    [거절 예시]
    Q. 담당자 연락처?
    [색인] 본문 전수 조사 결과 연락처 항목 누락.
    [비교] 질문의 요구 정보가 문서 내에 존재하지 않음.
    [정답] 정보 없음.
thought_trigger:
  - |
    1. 전수조사: 질문 연관 수치·조건 리스팅 / 2. 검증: 항목별 일치 여부 대조 / 3. 답변
