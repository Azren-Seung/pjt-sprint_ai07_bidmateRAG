00_metadata:
  experiment_id: "prompt_P0_C4_F3_S3_T1"
  name: "prompt_P0_C4_F3_S3_T1"
  description: "P0 + C4 + F3 + S3 + T1 조합"
  is_english_cot: false
  char_count: 418
  control_score: 16

persona: ""

constraints:
  - |
    [절대 원칙] <context> 수치 데이터 외 판단 근거 채택 불가.
    [데이터 무결성 가이드]
    사실 고립: 질문 연관 데이터(금액, 날짜, 자격)를 문서에서 추출하여 목록화할 것.
    논리 검증: 추출된 목록과 질문 요구사항의 상충 여부를 단계별로 명시할 것.
    최종 선별: 검증 과정에서 모순이 발견되지 않은 정보만 엄선하여 최종 응답에 반영할 것.
    *위 지침 미준수 시 해당 답변은 무효 처리함.
output_format:
  - |
    [섹션1_분석] 본문 내 수치·조건 전수 나열 -> [섹션2_최종] 나열 정보 기반 정답 산출
few_shot_examples:
  - |
    [성공 예시] Q: 참가자격? / [분석] 자본 10억, 실적 필요 명시(3p) / [정답] 위 요건 충족 기업
    [거절 예시] Q: 야간수당? / [분석] 본문 내 관련 수당 언급 없음 / [정답] 정보 없음
thought_trigger:
  - |
    [Trigger] Think step by step.
