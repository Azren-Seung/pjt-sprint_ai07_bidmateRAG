title: auto_exp_08
hypothesis:
  - merge 방식을 바꾸면 다문서 비교 질문에서 근거 다양성이 개선될 수 있다.
changes:
  - LLM 컨텍스트 헤더에 사업 금액/공개연도/기관유형 추가
