  - retrieval merge 로직을 round-robin으로 변경해 소스 균형 강화
expected_outcome:
  - 예산 질문 무응답 감소
  - 비교형 질문 retrieval hit 개선
next_actions:
  - judge 기준으로 실패 유형 재분류
failure_cases:
